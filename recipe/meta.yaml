{% set name = "rubicon-objc" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 90bee9fc1de4515e17615e15648989b88bb8d4d2ffc8c7c52748272cd7f30a66

build:
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools ==80.9.0
    - setuptools-scm ==8.3.1
  run:
    - python >={{ python_min }}

test:
  imports:
    - rubicon
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://beeware.org/rubicon
  summary: A bridge between an Objective C runtime environment and Python.
  dev_url: https://github.com/beeware/rubicon-objc
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
